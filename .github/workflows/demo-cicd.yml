name: bridge-console-demo-ci-cd

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/igorlatii/bridge-console

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -f Dockerfile.demo \
            --build-arg VITE_API_GATEWAY_URL=${{ secrets.VITE_API_GATEWAY_URL }} \
            -t $IMAGE_NAME:latest \
            -t $IMAGE_NAME:${GITHUB_SHA} \
            .

      - name: Push latest
        run: docker push $IMAGE_NAME:latest

      - name: Push sha
        run: docker push $IMAGE_NAME:${GITHUB_SHA}

  deploy-via-idp:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Trigger IDP release
        run: |
          curl -X POST "http://20.251.155.82:8000/releases" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{
              "service": "frontier-consult",
              "version": "'"${GITHUB_SHA}"'",
              "environment": "dev",
              "target": {
                "repo": "local",
                "ref": "'"${GITHUB_SHA}"'",
                "composePath": "docker-compose.yml"
              }
            }'